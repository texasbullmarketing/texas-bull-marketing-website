<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Card — Texas Bull Marketing</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <link rel="canonical" href="https://texasbullmarketing.com/card" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: #0f131c;
      color: #fff;
      font-family: "Space Grotesk", system-ui, sans-serif;
    }

    /* V2 · Neon Charge (approved) — TEXAS BULL on top, MARKETING under */
    .card {
      width: min(100%, 38rem);
      aspect-ratio: 3.5 / 2;
      display: grid;
      grid-template-columns: 40% 60%;
      grid-template-rows: 1fr auto;
      background:
        radial-gradient(circle at 86% 16%, rgba(200, 16, 46, 0.36), transparent 42%),
        radial-gradient(circle at 10% 90%, rgba(30, 58, 122, 0.48), transparent 48%),
        #1a2233;
      border-radius: 0.6rem;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 24px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .logo-panel {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9% 3% 6% 8%;
      min-height: 0;
    }
    .logo-panel img {
      width: 82%;
      max-width: 12rem;
      height: auto;
      max-height: 100%;
      object-fit: contain;
    }

    .info-panel {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8% 8% 3% 3%;
      min-height: 0;
    }

    /* TEXAS BULL (top) · MARKETING (under) */
    .name-box {
      margin: 0 0 1.1rem;
      line-height: 1.05;
    }
    .line1 {
      font-family: Syne, system-ui, sans-serif;
      font-weight: 800;
      font-size: clamp(1.55rem, 5.8vw, 2.35rem);
      letter-spacing: -0.03em;
      color: #fff;
    }
    .line1 .bull {
      color: #ff2d4a;
      text-shadow: 0 0 1.25rem rgba(200, 16, 46, 0.55);
    }
    .line2 {
      display: block;
      margin-top: 0.4rem;
      font-family: Syne, system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(0.62rem, 2.1vw, 0.88rem);
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    .fields {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
    }
    .field {
      font-weight: 600;
      font-size: clamp(0.72rem, 2.35vw, 1rem);
      line-height: 1.25;
      color: rgba(255, 255, 255, 0.92);
      width: 100%;
    }
    .field span {
      display: block;
      font-size: clamp(0.48rem, 1.45vw, 0.62rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ff6b82;
      margin-bottom: 0.15rem;
    }

    .memo {
      grid-column: 1 / -1;
      grid-row: 2;
      text-align: center;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(0.58rem, 1.9vw, 0.82rem);
      color: rgba(255, 255, 255, 0.7);
      padding: 0.15rem 1rem 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 420px) {
      .memo { white-space: normal; line-height: 1.3; }
    }
  </style>
</head>
<body>
  <article class="card" aria-label="Texas Bull Marketing business card — V2 Neon Charge">
    <div class="logo-panel">
      <img
        src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/image-1-9pRF4CyBiygUYC6Rty3wOLirZ8AxIw.png"
        alt="Texas Bull Marketing logo"
        width="320"
        height="320"
      />
    </div>
    <div class="info-panel">
      <div class="name-box">
        <!-- V2 Neon: brand on top, Marketing under -->
        <div class="line1">TEXAS <span class="bull">BULL</span></div>
        <span class="line2">Marketing</span>
      </div>
      <div class="fields">
        <div class="field"><span>Website</span>TexasBullMarketing.com</div>
        <div class="field"><span>Email</span>TexasBullMarketing@gmail.com</div>
        <div class="field"><span>Telephone</span>512-300-0000</div>
      </div>
    </div>
    <p class="memo">Honest websites. Optimized Google Profiles. No fluff.</p>
  </article>
</body>
</html>
