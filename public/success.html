<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment successful — Texas Bull Marketing</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#161C2A; --card:#222B3F; --red:#C8102E; --border:#3A4560; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: #fff;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 28rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2rem 1.75rem;
      text-align: center;
    }
    .check {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1rem;
      border-radius: 999px;
      background: rgba(200,16,46,.15);
      color: var(--red);
      display: grid;
      place-items: center;
      font-size: 1.75rem;
      font-weight: 900;
    }
    h1 {
      font-family: Archivo, sans-serif;
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }
    p { margin-top: .75rem; color: rgba(255,255,255,.65); font-size: .95rem; line-height: 1.5; }
    .meta {
      margin-top: 1rem;
      font-size: .75rem;
      color: rgba(255,255,255,.4);
      word-break: break-all;
    }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      background: var(--red);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      padding: .8rem 1.5rem;
      border-radius: 999px;
    }
    a:hover { background: #a50d25; }
  </style>
</head>
<body>
  <main class="card">
    <div class="check">✓</div>
    <h1>Payment successful</h1>
    <p>Thanks — your payment went through. We’ll follow up shortly with next steps for your project.</p>
    <p class="meta" id="sessionMeta"></p>
    <a href="/">Back to home</a>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search)
    const sessionId = params.get('session_id')
    if (sessionId) {
      document.getElementById('sessionMeta').textContent = 'Reference: ' + sessionId
    }
  </script>
</body>
</html>
