<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Site Demos | Texas Bull Marketing</title>
  <meta name="description" content="Live website demos built by Texas Bull Marketing for local businesses." />
  <meta name="robots" content="noindex,follow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bullred: '#C8102E',
            bullbg: '#161C2A',
            bullcard: '#242D40',
          },
          fontFamily: {
            display: ['Archivo', 'system-ui', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen bg-bullbg font-sans text-white antialiased">
  <div class="mx-auto max-w-5xl px-4 py-12 sm:px-6">
    <p class="text-xs font-800 uppercase tracking-[0.28em] text-bullred">Texas Bull Marketing</p>
    <h1 class="mt-3 font-display text-4xl font-900 tracking-tight sm:text-5xl">Client site demos</h1>

    <div class="mt-10 grid gap-4 sm:grid-cols-3">
      <a href="/demo/efs/" class="group rounded-xl border border-[#3A4560] bg-bullcard p-5 transition hover:border-bullred">
        <p class="text-xs font-700 uppercase tracking-widest text-bullred">Flooring</p>
        <h2 class="mt-2 font-display text-xl font-800 group-hover:text-white">EFS</h2>
        <p class="mt-1 text-sm text-white/55">Enterprise Flooring Solutions</p>
        <p class="mt-4 text-sm font-700 text-bullred">Open demo →</p>
      </a>
      <a href="/demo/ench/" class="group rounded-xl border border-[#3A4560] bg-bullcard p-5 transition hover:border-bullred">
        <p class="text-xs font-700 uppercase tracking-widest text-bullred">Restaurant</p>
        <h2 class="mt-2 font-display text-xl font-800">Ench</h2>
        <p class="mt-1 text-sm text-white/55">La Enchiladita · Nixon, TX</p>
        <p class="mt-4 text-sm font-700 text-bullred">Open demo →</p>
      </a>
      <a href="/demo/wave/" class="group rounded-xl border border-[#3A4560] bg-bullcard p-5 transition hover:border-bullred">
        <p class="text-xs font-700 uppercase tracking-widest text-bullred">Electronics</p>
        <h2 class="mt-2 font-display text-xl font-800">Wave</h2>
        <p class="mt-1 text-sm text-white/55">Wave Finders Electronics</p>
        <p class="mt-4 text-sm font-700 text-bullred">Open demo →</p>
      </a>
    </div>

    <p class="mt-10 text-sm text-white/40">
      <a href="/" class="text-white/70 underline-offset-2 hover:text-white hover:underline">← Back to Texas Bull Marketing</a>
    </p>
  </div>
</body>
</html>
