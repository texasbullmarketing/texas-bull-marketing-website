<form
    id="contact-form"
    class="space-y-5"
    hx-post="partials/form-success.html"
    hx-target="#contact-form-container"
    hx-swap="innerHTML"
    hx-indicator="#form-spinner">
    <div class="grid gap-5 sm:grid-cols-2">
        <div>
            <label for="first-name" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">First Name</label>
            <input type="text" id="first-name" name="first_name" required
                class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-600 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20"
                placeholder="Richard">
        </div>
        <div>
            <label for="last-name" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Last Name</label>
            <input type="text" id="last-name" name="last_name" required
                class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-600 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20"
                placeholder="Brewer">
        </div>
    </div>
    <div class="grid gap-5 sm:grid-cols-2">
        <div>
            <label for="email" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Email</label>
            <input type="email" id="email" name="email" required
                class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-600 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20"
                placeholder="you@email.com">
        </div>
        <div>
            <label for="phone" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Phone</label>
            <input type="tel" id="phone" name="phone"
                class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-600 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20"
                placeholder="(830) 555-0100">
        </div>
    </div>
    <div>
        <label for="message" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Message</label>
        <textarea id="message" name="message" rows="4" required
            class="w-full resize-none rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-600 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20"
            placeholder="Tell us about your project…"></textarea>
    </div>
    <button type="submit"
        class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-4 text-sm font-semibold text-white shadow-lg shadow-cyan-500/25 transition hover:shadow-cyan-500/40">
        <span class="relative z-10 flex items-center justify-center gap-2">
            <span id="form-spinner" class="htmx-indicator">
                <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
            </span>
            Send Message
            <svg class="h-4 w-4 transition group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
            </svg>
        </span>
        <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent transition group-hover:translate-x-full duration-700"></div>
    </button>
</form>
